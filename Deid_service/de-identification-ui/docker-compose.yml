version: "3.8"

services:
  app:
    build: .
    ports:
      - "80:80"
    container_name: de-identification-ui
    restart: unless-stopped
    volumes:
      - ./public:/app/public
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./entrypoint.sh:/entrypoint.sh
    environment:
      - NODE_ENV=production
      - NEXT_PRIVATE_STANDALONE=true
    entrypoint: ["/entrypoint.sh"]
